<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polynomial Grapher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Georgia, serif;
            background: #fafafa;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border: 2px solid #4c1d95;
        }
        
        h1 {
            color: #4c1d95;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 25px;
        }
        
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #c026d3;
            background: white;
            font-family: Georgia, serif;
            font-size: 16px;
            color: #4c1d95;
            margin-bottom: 25px;
            cursor: pointer;
        }
        
        .step-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            background: #4c1d95;
            color: white;
            border: none;
            font-family: Georgia, serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
        }
        
        button:hover {
            background: #6b21a8;
        }
        
        button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }
        
        .current-step {
            background: #faf5ff;
            border: 2px solid #c026d3;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .step-title {
            color: #4c1d95;
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 12px;
        }
        
        .step-content {
            color: #1f2937;
            line-height: 1.8;
        }
        
        .step-content strong {
            color: #4c1d95;
        }
        
        canvas {
            display: block;
            width: 100%;
            border: 2px solid #d1d5db;
            background: white;
            margin-bottom: 20px;
        }
        
        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .analysis-box {
            background: #f0fdf4;
            border: 2px solid #10b981;
            padding: 15px;
            color: #065f46;
        }
        
        .analysis-title {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .info {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            color: #1e40af;
            line-height: 1.7;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Polynomial Grapher</h1>
        <p class="subtitle">Follow the step-by-step process to sketch polynomial graphs from factored form</p>
        
        <select id="polynomial-select">
            <option value="0">f(x) = (x + 2)(x - 1)(x - 3)</option>
            <option value="1">f(x) = -(x + 1)(x - 2)²</option>
            <option value="2">f(x) = 2(x + 3)(x)(x - 2)</option>
            <option value="3">f(x) = (x + 2)²(x - 1)²</option>
            <option value="4">f(x) = -x(x + 1)²(x - 3)</option>
            <option value="5">f(x) = (x + 1)(x - 2)(x - 4)</option>
        </select>
        
        <div class="step-controls">
            <button id="prev-step">← Previous Step</button>
            <button id="next-step">Next Step →</button>
            <button id="reset">Reset to Step 1</button>
        </div>
        
        <div class="current-step" id="step-display">
            <div class="step-title">Step 1: Identify Zeros and Multiplicity</div>
            <div class="step-content">Set each factor equal to zero to find the zeros (x-intercepts).</div>
        </div>
        
        <canvas id="graph" width="800" height="500"></canvas>
        
        <div class="analysis-grid" id="analysis"></div>
        
        <div class="info" id="info-box">
            Click "Next Step" to begin the graphing process!
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');
        
        const polySelect = document.getElementById('polynomial-select');
        const prevBtn = document.getElementById('prev-step');
        const nextBtn = document.getElementById('next-step');
        const resetBtn = document.getElementById('reset');
        
        const stepDisplay = document.getElementById('step-display');
        const analysisDiv = document.getElementById('analysis');
        const infoBox = document.getElementById('info-box');
        
        let currentStep = 1;
        const totalSteps = 5;
        
        const polynomials = [
            { 
                zeros: [-2, 1, 3], 
                mults: [1, 1, 1], 
                a: 1,
                name: 'f(x) = (x + 2)(x - 1)(x - 3)'
            },
            { 
                zeros: [-1, 2], 
                mults: [1, 2], 
                a: -1,
                name: 'f(x) = -(x + 1)(x - 2)²'
            },
            { 
                zeros: [-3, 0, 2], 
                mults: [1, 1, 1], 
                a: 2,
                name: 'f(x) = 2(x + 3)(x)(x - 2)'
            },
            { 
                zeros: [-2, 1], 
                mults: [2, 2], 
                a: 1,
                name: 'f(x) = (x + 2)²(x - 1)²'
            },
            { 
                zeros: [0, -1, 3], 
                mults: [1, 2, 1], 
                a: -1,
                name: 'f(x) = -x(x + 1)²(x - 3)'
            },
            { 
                zeros: [-1, 2, 4], 
                mults: [1, 1, 1], 
                a: 1,
                name: 'f(x) = (x + 1)(x - 2)(x - 4)'
            }
        ];
        
        let currentPoly = polynomials[0];
        
        function evaluatePoly(x) {
            let result = currentPoly.a;
            for (let i = 0; i < currentPoly.zeros.length; i++) {
                result *= Math.pow(x - currentPoly.zeros[i], currentPoly.mults[i]);
            }
            return result;
        }
        
        function getDegree() {
            return currentPoly.mults.reduce((sum, m) => sum + m, 0);
        }
        
        function getEndBehavior() {
            const degree = getDegree();
            const a = currentPoly.a;
            
            if (degree % 2 === 0) {
                if (a > 0) return { left: '↑ (up)', right: '↑ (up)' };
                else return { left: '↓ (down)', right: '↓ (down)' };
            } else {
                if (a > 0) return { left: '↓ (down)', right: '↑ (up)' };
                else return { left: '↑ (up)', right: '↓ (down)' };
            }
        }
        
        function updateStepDisplay() {
            const steps = [
                {
                    title: 'Step 1: Identify Zeros and Multiplicity',
                    content: 'Set each factor equal to zero to find the zeros (x-intercepts).<br><br>' +
                             '<strong>Zeros:</strong> ' + currentPoly.zeros.map((z, i) => 
                                `x = ${z} (mult ${currentPoly.mults[i]} - ${currentPoly.mults[i] % 2 === 0 ? 'bounces' : 'crosses'})`
                             ).join(', '),
                    info: 'Odd multiplicity = crosses through x-axis. Even multiplicity = touches and bounces.'
                },
                {
                    title: 'Step 2: Determine End Behavior',
                    content: `<strong>Degree:</strong> ${getDegree()} (${getDegree() % 2 === 0 ? 'even' : 'odd'})<br>` +
                             `<strong>Leading coefficient:</strong> ${currentPoly.a} (${currentPoly.a > 0 ? 'positive' : 'negative'})<br><br>` +
                             `As x → -∞: ${getEndBehavior().left}<br>` +
                             `As x → ∞: ${getEndBehavior().right}`,
                    info: 'The leading term dominates for large |x|. Even degree: same ends. Odd degree: opposite ends.'
                },
                {
                    title: 'Step 3: Find Y-Intercept',
                    content: `Plug in x = 0:<br><strong>y-intercept = ${evaluatePoly(0)}</strong><br>Point: (0, ${evaluatePoly(0)})`,
                    info: 'The y-intercept is where the graph crosses the y-axis (when x = 0).'
                },
                {
                    title: 'Step 4: Plot Strategic Points',
                    content: 'Plot the zeros, y-intercept, and a few points between zeros to see the curve shape.',
                    info: 'Pick x-values between consecutive zeros to determine whether the graph goes up or down in each region.'
                },
                {
                    title: 'Step 5: Sketch the Complete Graph',
                    content: 'Connect all points smoothly, respecting zero behavior and end behavior.',
                    info: 'The complete graph shows all features: zeros with correct behavior, y-intercept, and proper end behavior.'
                }
            ];
            
            const step = steps[currentStep - 1];
            stepDisplay.innerHTML = `<div class="step-title">${step.title}</div><div class="step-content">${step.content}</div>`;
            infoBox.textContent = step.info;
            
            // Update analysis boxes based on current step
            if (currentStep >= 1) {
                analysisDiv.innerHTML = `
                    <div class="analysis-box">
                        <div class="analysis-title">Zeros</div>
                        ${currentPoly.zeros.map((z, i) => `x = ${z} (m=${currentPoly.mults[i]})`).join('<br>')}
                    </div>
                `;
            }
            if (currentStep >= 2) {
                analysisDiv.innerHTML += `
                    <div class="analysis-box">
                        <div class="analysis-title">End Behavior</div>
                        Left: ${getEndBehavior().left}<br>
                        Right: ${getEndBehavior().right}
                    </div>
                `;
            }
            if (currentStep >= 3) {
                analysisDiv.innerHTML += `
                    <div class="analysis-box">
                        <div class="analysis-title">Y-Intercept</div>
                        (0, ${evaluatePoly(0)})
                    </div>
                `;
            }
            if (currentStep >= 4) {
                analysisDiv.innerHTML += `
                    <div class="analysis-box">
                        <div class="analysis-title">Degree</div>
                        ${getDegree()} (${getDegree() % 2 === 0 ? 'even' : 'odd'})
                    </div>
                `;
            }
            
            prevBtn.disabled = currentStep === 1;
            nextBtn.disabled = currentStep === totalSteps;
        }
        
        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const padding = 40;
            const graphWidth = canvas.width - 2 * padding;
            const graphHeight = canvas.height - 2 * padding;
            
            const xMin = Math.min(...currentPoly.zeros) - 2;
            const xMax = Math.max(...currentPoly.zeros) + 2;
            const xRange = xMax - xMin;
            
            // Sample for y range
            let yValues = [];
            for (let x = xMin; x <= xMax; x += 0.1) {
                yValues.push(evaluatePoly(x));
            }
            let yMin = Math.min(...yValues);
            let yMax = Math.max(...yValues);
            
            const yPadding = (yMax - yMin) * 0.15;
            yMin -= yPadding;
            yMax += yPadding;
            const yRange = yMax - yMin;
            
            const toCanvasX = (x) => padding + ((x - xMin) / xRange) * graphWidth;
            const toCanvasY = (y) => padding + ((yMax - y) / yRange) * graphHeight;
            
            // Draw axes
            ctx.strokeStyle = '#d1d5db';
            ctx.lineWidth = 2;
            
            const xAxisY = toCanvasY(0);
            if (xAxisY >= padding && xAxisY <= canvas.height - padding) {
                ctx.beginPath();
                ctx.moveTo(padding, xAxisY);
                ctx.lineTo(canvas.width - padding, xAxisY);
                ctx.stroke();
            }
            
            const yAxisX = toCanvasX(0);
            if (yAxisX >= padding && yAxisX <= canvas.width - padding) {
                ctx.beginPath();
                ctx.moveTo(yAxisX, padding);
                ctx.lineTo(yAxisX, canvas.height - padding);
                ctx.stroke();
            }
            
            // Step 1: Just zeros
            if (currentStep >= 1) {
                ctx.fillStyle = '#c026d3';
                currentPoly.zeros.forEach(z => {
                    ctx.beginPath();
                    ctx.arc(toCanvasX(z), toCanvasY(0), 8, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
            
            // Step 3: Y-intercept
            if (currentStep >= 3) {
                ctx.fillStyle = '#10b981';
                ctx.beginPath();
                ctx.arc(toCanvasX(0), toCanvasY(evaluatePoly(0)), 8, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Step 4: Sample points
            if (currentStep >= 4) {
                ctx.fillStyle = '#3b82f6';
                const samplePoints = [];
                for (let i = 0; i < currentPoly.zeros.length - 1; i++) {
                    const midX = (currentPoly.zeros[i] + currentPoly.zeros[i + 1]) / 2;
                    samplePoints.push(midX);
                }
                samplePoints.forEach(x => {
                    ctx.beginPath();
                    ctx.arc(toCanvasX(x), toCanvasY(evaluatePoly(x)), 6, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
            
            // Step 5: Full curve
            if (currentStep >= 5) {
                ctx.strokeStyle = '#4c1d95';
                ctx.lineWidth = 3;
                ctx.beginPath();
                
                let firstPoint = true;
                for (let px = 0; px <= graphWidth; px++) {
                    const x = xMin + (px / graphWidth) * xRange;
                    const y = evaluatePoly(x);
                    const cy = toCanvasY(y);
                    
                    if (cy >= padding - 20 && cy <= canvas.height - padding + 20) {
                        if (firstPoint) {
                            ctx.moveTo(toCanvasX(x), cy);
                            firstPoint = false;
                        } else {
                            ctx.lineTo(toCanvasX(x), cy);
                        }
                    }
                }
                ctx.stroke();
            }
        }
        
        prevBtn.addEventListener('click', () => {
            if (currentStep > 1) {
                currentStep--;
                updateStepDisplay();
                drawGraph();
            }
        });
        
        nextBtn.addEventListener('click', () => {
            if (currentStep < totalSteps) {
                currentStep++;
                updateStepDisplay();
                drawGraph();
            }
        });
        
        resetBtn.addEventListener('click', () => {
            currentStep = 1;
            updateStepDisplay();
            drawGraph();
        });
        
        polySelect.addEventListener('change', () => {
            currentPoly = polynomials[parseInt(polySelect.value)];
            currentStep = 1;
            updateStepDisplay();
            drawGraph();
        });
        
        updateStepDisplay();
        drawGraph();
    </script>
</body>
</html>
