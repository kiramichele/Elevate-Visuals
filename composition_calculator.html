<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Composition Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #f9fafb;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border: 2px solid #ea580c;
        }
        h1 {
            color: #0a1628;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .function-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0a1628;
            font-size: 14px;
        }
        select {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 2px solid #d1d5db;
            font-family: Georgia, serif;
        }
        .slider-value {
            color: #ea580c;
            font-weight: 700;
        }
        input[type="range"] {
            width: 100%;
            margin-bottom: 20px;
        }
        #result {
            background: #f3f4f6;
            border: 2px solid #0a1628;
            padding: 20px;
            font-size: 14px;
        }
        .step-box {
            padding: 12px;
            margin-bottom: 12px;
            border-left: 3px solid;
        }
        .step1 {
            background: #dbeafe;
            border-color: #3b82f6;
        }
        .step2 {
            background: #fed7aa;
            border-color: #ea580c;
        }
        .final {
            font-weight: 600;
            color: #ea580c;
            font-size: 16px;
            margin-top: 12px;
        }
        .note {
            margin-top: 16px;
            font-size: 13px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Function Composition Calculator</h1>
        <p class="subtitle">PreCalculus Module 1 • Lesson 6</p>
        
        <div class="function-grid">
            <div>
                <label for="gFunc">Inner Function g(x):</label>
                <select id="gFunc">
                    <option value="2x+1">g(x) = 2x + 1</option>
                    <option value="x2">g(x) = x²</option>
                    <option value="sqrt">g(x) = √x</option>
                    <option value="x-3">g(x) = x - 3</option>
                </select>
            </div>
            <div>
                <label for="fFunc">Outer Function f(x):</label>
                <select id="fFunc">
                    <option value="x2">f(x) = x²</option>
                    <option value="2x+1">f(x) = 2x + 1</option>
                    <option value="sqrt">f(x) = √x</option>
                    <option value="abs">f(x) = |x|</option>
                </select>
            </div>
        </div>
        
        <label>Evaluate at x = <span class="slider-value" id="xVal">2.0</span></label>
        <input type="range" id="xSlider" min="-5" max="5" step="0.5" value="2">
        
        <div id="result"></div>
        
        <p class="note">
            <strong>Remember:</strong> (f ∘ g)(x) = f(g(x)) — work inside out! Apply g first (blue step), then apply f to that result (orange step).
        </p>
    </div>
    
    <script>
        const gSelect = document.getElementById('gFunc');
        const fSelect = document.getElementById('fFunc');
        const xSlider = document.getElementById('xSlider');
        const result = document.getElementById('result');
        
        function evalG(x, type) {
            switch(type) {
                case '2x+1': return 2*x + 1;
                case 'x2': return x*x;
                case 'sqrt': return x >= 0 ? Math.sqrt(x) : NaN;
                case 'x-3': return x - 3;
            }
        }
        
        function evalF(x, type) {
            switch(type) {
                case 'x2': return x*x;
                case '2x+1': return 2*x + 1;
                case 'sqrt': return x >= 0 ? Math.sqrt(x) : NaN;
                case 'abs': return Math.abs(x);
            }
        }
        
        function getFormula(type) {
            switch(type) {
                case '2x+1': return '2x + 1';
                case 'x2': return 'x²';
                case 'sqrt': return '√x';
                case 'x-3': return 'x - 3';
                case 'abs': return '|x|';
            }
        }
        
        function calculate() {
            const x = parseFloat(xSlider.value);
            document.getElementById('xVal').textContent = x.toFixed(1);
            
            const gType = gSelect.value;
            const fType = fSelect.value;
            
            const gResult = evalG(x, gType);
            const fResult = evalF(gResult, fType);
            
            let html = '<div style="margin-bottom:12px;"><strong style="color:#0a1628;font-size:16px;">Computing (f ∘ g)(' + x.toFixed(1) + '):</strong></div>';
            
            html += '<div class="step-box step1">';
            html += '<div style="font-weight:600;color:#1e40af;margin-bottom:4px;">Step 1: Apply inner function g</div>';
            html += '<div>g(x) = ' + getFormula(gType) + '</div>';
            html += '<div>g(' + x.toFixed(1) + ') = ' + gResult.toFixed(2) + '</div>';
            html += '</div>';
            
            html += '<div class="step-box step2">';
            html += '<div style="font-weight:600;color:#c2410c;margin-bottom:4px;">Step 2: Apply outer function f to result</div>';
            html += '<div>f(x) = ' + getFormula(fType) + '</div>';
            html += '<div>f(' + gResult.toFixed(2) + ') = ' + fResult.toFixed(2) + '</div>';
            html += '</div>';
            
            html += '<div class="final">Final Answer: (f ∘ g)(' + x.toFixed(1) + ') = ' + fResult.toFixed(2) + '</div>';
            
            result.innerHTML = html;
        }
        
        gSelect.addEventListener('change', calculate);
        fSelect.addEventListener('change', calculate);
        xSlider.addEventListener('input', calculate);
        
        calculate();
    </script>
</body>
</html>
