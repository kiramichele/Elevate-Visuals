<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X and Y Intercepts Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #f9fafb;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border: 2px solid #ea580c;
        }
        h1 {
            color: #0a1628;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0a1628;
            font-size: 14px;
        }
        select {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border: 2px solid #d1d5db;
            font-family: Georgia, serif;
            margin-bottom: 20px;
        }
        #output {
            background: #fffbeb;
            border: 2px solid #ea580c;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            min-height: 120px;
        }
        .intercept-info {
            margin-bottom: 12px;
        }
        .intercept-label {
            font-weight: 600;
            color: #0a1628;
            margin-bottom: 4px;
        }
        canvas {
            display: block;
            width: 100%;
            border: 2px solid #0a1628;
            background: #ffffff;
        }
        .legend {
            margin-top: 16px;
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 13px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .note {
            margin-top: 16px;
            font-size: 13px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>X and Y Intercepts Explorer</h1>
        <p class="subtitle">PreCalculus Module 1 • Lesson 2</p>
        
        <label for="functionType">Select Function:</label>
        <select id="functionType">
            <option value="linear">Linear: f(x) = x - 2</option>
            <option value="quadratic">Quadratic: f(x) = x² - 4</option>
            <option value="cubic">Cubic: f(x) = (x-1)(x+1)(x-2)</option>
            <option value="absolute">Absolute Value: f(x) = |x - 2| - 1</option>
        </select>
        
        <div id="output"></div>
        
        <canvas id="graph" width="700" height="500"></canvas>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background:#3b82f6;"></div>
                <span>Function</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#10b981;"></div>
                <span>Y-Intercept</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#f59e0b;"></div>
                <span>X-Intercept(s)</span>
            </div>
        </div>
        
        <p class="note">
            <strong>Key Concept:</strong> X-intercepts occur where y = 0 (the graph crosses the x-axis). 
            The Y-intercept occurs where x = 0 (the graph crosses the y-axis).
        </p>
    </div>
    
    <script>
        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');
        const select = document.getElementById('functionType');
        const output = document.getElementById('output');
        
        function getFunction(x, type) {
            switch(type) {
                case 'linear': return x - 2;
                case 'quadratic': return x * x - 4;
                case 'cubic': return (x - 1) * (x + 1) * (x - 2);
                case 'absolute': return Math.abs(x - 2) - 1;
            }
        }
        
        function getIntercepts(type) {
            let xIntercepts = [];
            let yIntercept = 0;
            
            switch(type) {
                case 'linear':
                    xIntercepts = [2];
                    yIntercept = -2;
                    break;
                case 'quadratic':
                    xIntercepts = [-2, 2];
                    yIntercept = -4;
                    break;
                case 'cubic':
                    xIntercepts = [1, -1, 2];
                    yIntercept = -2;
                    break;
                case 'absolute':
                    xIntercepts = [1, 3];
                    yIntercept = 1;
                    break;
            }
            
            return { xIntercepts, yIntercept };
        }
        
        function drawAxes() {
            ctx.strokeStyle = '#0a1628';
            ctx.lineWidth = 2;
            
            // X-axis
            ctx.beginPath();
            ctx.moveTo(0, canvas.height/2);
            ctx.lineTo(canvas.width, canvas.height/2);
            ctx.stroke();
            
            // Y-axis
            ctx.beginPath();
            ctx.moveTo(canvas.width/2, 0);
            ctx.lineTo(canvas.width/2, canvas.height);
            ctx.stroke();
            
            // Grid
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1;
            for (let i = -14; i <= 14; i++) {
                if (i === 0) continue;
                const x = canvas.width/2 + i * 35;
                const y = canvas.height/2 + i * 35;
                
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // Axis labels
            ctx.fillStyle = '#0a1628';
            ctx.font = '14px Georgia';
            ctx.fillText('x', canvas.width - 20, canvas.height/2 - 10);
            ctx.fillText('y', canvas.width/2 + 10, 20);
            
            // Tick marks and numbers
            ctx.fillStyle = '#4b5563';
            ctx.font = '11px Georgia';
            for (let i = -8; i <= 8; i += 2) {
                if (i === 0) continue;
                const x = canvas.width/2 + i * 35;
                const y = canvas.height/2 + i * 35;
                
                ctx.fillText(i, x - 5, canvas.height/2 + 20);
                ctx.fillText(-i, canvas.width/2 + 10, y + 4);
            }
        }
        
        function plotFunction(type) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawAxes();
            
            const intercepts = getIntercepts(type);
            
            // Draw function
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 3;
            ctx.beginPath();
            let started = false;
            
            for (let px = 0; px < canvas.width; px++) {
                const x = (px - canvas.width/2) / 35;
                const y = getFunction(x, type);
                
                if (!isNaN(y) && isFinite(y)) {
                    const py = canvas.height/2 - y * 35;
                    if (py >= -50 && py <= canvas.height + 50) {
                        if (!started) {
                            ctx.moveTo(px, py);
                            started = true;
                        } else {
                            ctx.lineTo(px, py);
                        }
                    } else {
                        started = false;
                    }
                } else {
                    started = false;
                }
            }
            ctx.stroke();
            
            // Draw Y-intercept (green)
            const yInterceptPx = canvas.width/2;
            const yInterceptPy = canvas.height/2 - intercepts.yIntercept * 35;
            ctx.fillStyle = '#10b981';
            ctx.beginPath();
            ctx.arc(yInterceptPx, yInterceptPy, 8, 0, 2*Math.PI);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw X-intercepts (orange)
            ctx.fillStyle = '#f59e0b';
            intercepts.xIntercepts.forEach(xInt => {
                const xInterceptPx = canvas.width/2 + xInt * 35;
                const xInterceptPy = canvas.height/2;
                ctx.beginPath();
                ctx.arc(xInterceptPx, xInterceptPy, 8, 0, 2*Math.PI);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
            
            // Update output
            let html = '<div class="intercept-info">';
            html += '<div class="intercept-label">Y-Intercept (where x = 0):</div>';
            html += '<div>Point: (0, ' + intercepts.yIntercept + ')</div>';
            html += '</div>';
            
            html += '<div class="intercept-info">';
            html += '<div class="intercept-label">X-Intercept(s) (where y = 0):</div>';
            if (intercepts.xIntercepts.length === 1) {
                html += '<div>Point: (' + intercepts.xIntercepts[0] + ', 0)</div>';
            } else {
                html += '<div>Points: ';
                html += intercepts.xIntercepts.map(x => '(' + x + ', 0)').join(', ');
                html += '</div>';
            }
            html += '</div>';
            
            html += '<div style="margin-top:12px;color:#4b5563;font-size:13px;">';
            html += 'The graph crosses the x-axis at the x-intercept(s) and crosses the y-axis at the y-intercept.';
            html += '</div>';
            
            output.innerHTML = html;
        }
        
        select.addEventListener('change', (e) => plotFunction(e.target.value));
        plotFunction('linear');
    </script>
</body>
</html>
